<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECM Daily Report — Trung Sơn Pharma</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #f4f6f5; }
  iframe {
    width: 100%;
    height: 100vh;
    border: none;
    display: block;
  }
  .loader {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #f4f6f5;
    gap: 16px;
    z-index: 10;
    transition: opacity .4s;
  }
  .loader.hide { opacity: 0; pointer-events: none; }
  .logo {
    width: 48px; height: 48px;
    background: #1a6b3c;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: #fff;
    font-family: serif;
  }
  .spin {
    width: 28px; height: 28px;
    border: 3px solid #d9e4dd;
    border-top-color: #1a6b3c;
    border-radius: 50%;
    animation: sp .8s linear infinite;
  }
  @keyframes sp { to { transform: rotate(360deg); } }
  p { font-family: 'Be Vietnam Pro', sans-serif; font-size: 13px; color: #4a6357; }
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="logo">TS</div>
  <div class="spin"></div>
  <p>Đang tải ECM Daily Report…</p>
</div>

<iframe
  src="https://script.google.com/macros/s/AKfycbyCrfIViiLAAc1XYS2p0gDOB0UhdFyd_Z4IZi5vYjQs7RB6giXjdeZwZZajhwpvp1rbEA/exec"
  id="app"
  allowfullscreen
  onload="document.getElementById('loader').classList.add('hide')"
></iframe>

</body>
</html>
